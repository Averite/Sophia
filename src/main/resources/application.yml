#配置端口
server:
  port: 8888
spring:
  ##配置数据库
  datasource:
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/springboot_mybatis-plus?useUnicode=true&characterEncoding=utf-8&serverTimezone=GMT%2B8
  #配置thymeleaf
  thymeleaf:
    cache: false
    check-template: true
    check-template-location: true
    servlet:
      content-type: text/html; charset=utf-8
    prefix: classpath:/templates/
    suffix: .html
  main:
    allow-circular-references: true
# mybatis-plus配置
mybatis-plus:
  # xml文件位置
  mapper-locations: classpath:mapper/*.xml
