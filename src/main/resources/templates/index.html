	<title>会员列表</title>
</head>

<body>
<div style="text-align: center;margin-top: 40px">
	<h1>健身房会员管理系统</h1>
</div>
<div class="page-content clearfix">
	<div id="Member_Ratings">
		<div class="d_Confirm_Order_style">
			<div class="search_style">
				<div class="title_names">搜索查询</div>
				<form th:action="@{/selectByName}" method="post">
					<ul class="search_content clearfix">
						<li><label class="l_f">会员名称</label><input name="memberName" type="text"  class="text_add" placeholder="输入会员名称"  style=" width:400px"/></li>
						<li style="width:90px;"><button type="submit" class="btn_search"><i class="icon-search"></i>查询</button></li>
					</ul>
				</form>

			</div>
			<!---->
			<div class="border clearfix">
       <span class="l_f">
        <a href="javascript:ovid()" id="member_add" class="btn btn-warning"><i class="icon-plus"></i>添加用户</a>
       </span>
			</div>
			<!---->
			<div class="table_menu_list">
				<table class="table table-striped table-bordered table-hover" id="sample-table">
					<thead>
					<tr>
					<tr>
						<th width="25"><label><input type="checkbox" class="ace"><span class="lbl"></span></label></th>
						<th width="80">ID</th>
						<th width="100">会员卡号</th>
						<th width="80">会员名称</th>
						<th width="120">性别</th>
						<th width="150">年龄</th>
						<th width="100">手机号</th>
						<th width="180">性格</th>
						<th width="100">会员到期时间</th>
						<th width="250">操作</th>
					</tr>
					</thead>
					<tbody>
					<tr th:each="member:${members}">
						<td><label><input type="checkbox" class="ace"><span class="lbl"></span></label></td>
						<td th:text="${member.memberId}">1</td>
						<td th:text="${member.memberNo}"></td>
						<td th:text="${member.memberName}">1</td>
						<td  th:text="${member.gender}">admin</td>
						<td th:text="${member.age}"></td>
						<td th:text="${member.phone}"></td>
						<td th:text="${member.personality}"></td>
						<td th:text="${member.dueDate}"></td>
						<td class="td-manage">
							<a title="编辑" th:onclick="member_edit([[${member.memberId}]])" href="javascript:;"  class="btn btn-xs btn-info" ><i class="icon-edit bigger-120"></i></a>
							<a title="删除" href="javascript:;"  th:onclick="member_del(this,[[${member.memberId}]])" class="btn btn-xs btn-warning" ><i class="icon-trash  bigger-120"></i></a>
						</td>
					</tr>
					</tbody>
				</table>
			</div>
		</div>
	</div>
</div>
<!--添加用户图层-->
<div class="add_menber" id="add_menber_style" style="display:none">

	<input type="hidden" id="memberId" />
	<ul class=" page-content">
		<li><label class="label_name">会员卡号：</label><span class="add_name"><input value="" name="会员卡号" type="text" id="memberNo"  class="text_add"/></span><div class="prompt r_f"></div></li>
		<li><label class="label_name">性别：</label><span class="add_name">
     <label><input name="form-field-radio" type="radio" checked="checked" value="男" class="ace"><span class="lbl">男</span></label>&nbsp;&nbsp;&nbsp;
     <label><input name="form-field-radio" type="radio" value="女" class="ace"><span class="lbl">女</span></label>&nbsp;&nbsp;&nbsp;
     </span>
			<div class="prompt r_f"></div>
		</li>
		<li><label class="label_name">会员名称：</label><span class="add_name"><input name="会员名称" type="text" id="memberName"  class="text_add"/></span><div class="prompt r_f"></div></li>

		<li><label class="label_name">年龄：</label><span class="add_name"><input name="年龄" type="text" id="age"  class="text_add"/></span><div class="prompt r_f"></div></li>
		<li><label class="label_name">到期时间：</label><span class="add_name"><input name="到期时间" type="date" id="dueDate"  class="text_add"/></span><div class="prompt r_f"></div></li>

		<li><label class="label_name">手机号：</label><span class="add_name"><input name="手机号" type="text" id="phone"  class="text_add"/></span><div class="prompt r_f"></div></li>
		<li class="adderss"><label class="label_name">性格：</label><span class="add_name"><textarea rows="2" id="personality" cols="72"></textarea></span><div class="prompt r_f"></div></li>
	</ul>
</div>
</body>
</html>
<script>
	/*用户-添加*/
	$('#member_add').on('click', function(){
		$("#memberId").val("");
		$("#memberName").val("");
		$("#memberNo").val("");
		$('input[name="form-field-radio"][value="男"]').prop('checked', true);

		$("#age").val("");
		$("#phone").val("");
		$("#dueDate").val("");
		$("#personality").val("");
		layer.open({
			type: 1,
			title: '添加用户',
			maxmin: true,
			shadeClose: true, //点击遮罩关闭层
			area : ['800px' , ''],
			content:$('#add_menber_style'),
			btn:['提交','取消'],
			yes:function(index,layero){
				var num=0;
				var str="";
				$(".add_menber input[type$='text']").each(function(n){
					if($(this).val()=="")
					{

						layer.alert(str+=""+$(this).attr("name")+"不能为空！\r\n",{
							title: '提示框',
							icon:0,
						});
						num++;
						return false;
					}
				});
				if(num>0){  return false;}
				else{
					var memberId = $("#memberId").val();
					var memberNo = $("#memberNo").val();
					var memberName = $("#memberName").val();
					var gender = $('input[name="form-field-radio"]:checked').val();  ;
					var age = $("#age").val();
					var phone = $("#phone").val();
					var personality = $("#personality").val();
					var dueDate = $("#dueDate").val();

					$.ajax({
						url: "/insert",
						type: "POST",
						data: {
							memberId: memberId,
							memberNo: memberNo,
							memberName: memberName,
							gender: gender,
							age: age,
							phone: phone,
							personality: personality,
							dueDate: dueDate
						},
						traditional: true,
						success: function (data) {
							if (data == "true") {
								layer.alert('新增成功！',{
									title: '提示框',
									icon:1,
								},function (){
									window.open('http://localhost:8888/selectAll', '_self');
								});
								layer.close(index);
							} else {
								layer.msg('新增失败!', {icon: 5, time: 1000});
							}

						}
					})
				}
			}
		});
	});

	/*用户-编辑*/
	function member_edit(id){
		$.ajax({
			url: "/getInfo/"+id,
			type: "POST",
			traditional: true,
			success: function (data) {
				$("#memberId").val(data.memberId);
				$("#memberName").val(data.memberName);
				$("#memberNo").val(data.memberNo);
				var gender = data.gender;
				if(gender=="男"){
					$('input[name="form-field-radio"][value="男"]').prop('checked', true);
				}
				if(gender=="女"){
					$('input[name="form-field-radio"][value="女"]').prop('checked', true);
				}

				$("#age").val(data.age);
				$("#phone").val(data.phone);
				$("#dueDate").val(data.dueDate);
				$("#personality").val(data.personality);

			}
		})
		layer.open({
			type: 1,
			title: '修改用户信息',
			maxmin: true,
			shadeClose:false, //点击遮罩关闭层
			area : ['800px' , ''],
			content:$('#add_menber_style'),
			btn:['提交','取消'],
			yes:function(index,layero){
				var num=0;
				var str="";
				$(".add_menber input[type$='text']").each(function(n){
					if($(this).val()=="")
					{

						layer.alert(str+=""+$(this).attr("name")+"不能为空！\r\n",{
							title: '提示框',
							icon:0,
						});
						num++;
						return false;
					}
				});
				if(num>0){  return false;}
				else{
					var memberId = $("#memberId").val();
					var memberNo = $("#memberNo").val();
					var memberName = $("#memberName").val();
					var gender = $('input[name="form-field-radio"]:checked').val();  ;
					var age = $("#age").val();
					var phone = $("#phone").val();
					var personality = $("#personality").val();
					var dueDate = $("#dueDate").val();

					$.ajax({
						url: "/update",
						type: "POST",
						data: {
							memberId: memberId,
							memberNo: memberNo,
							memberName: memberName,
							gender: gender,
							age: age,
							phone: phone,
							personality: personality,
							dueDate: dueDate
						},
						traditional: true,
						success: function (data) {
							if (data == "true") {
								layer.alert('修改成功！',{
									title: '提示框',
									icon:1,
								},function (){
									window.open('http://localhost:8888/selectAll', '_self');
								});
								layer.close(index);
							} else {
								layer.msg('修改失败!', {icon: 5, time: 1000});
							}

						}
					})

				}
			}
		});
	}
	/*用户-删除*/
	function member_del(obj,id){
		layer.confirm('确认要删除吗？',function(index) {
			$.ajax({
				url: "/delete",
				type: "POST",
				data: {
					id: id
				},
				traditional: true,
				success: function (data) {
					if (data == "true") {
						$(obj).parents("tr").remove();
						layer.alert('删除成功！',{
							title: '提示框',
							icon:1,
						},function (){
							window.open('http://localhost:8888/selectAll', '_self');
						});
						layer.close(index);
					} else {
						layer.msg('删除失败!', {icon: 5, time: 1000});
					}

				}
			})
		})
	}
	laydate({
		elem: '#start',
		event: 'focus'
	});

</script>
